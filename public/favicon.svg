<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <g transform="translate(16,16)">
    <!-- Compass circle -->
    <circle cx="0" cy="0" r="9" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- N/S/E/W marks -->
    <line x1="0" y1="-9" x2="0" y2="-7" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="0" y1="9" x2="0" y2="7" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="-9" y1="0" x2="-7" y2="0" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="9" y1="0" x2="7" y2="0" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <!-- Compass needle - north (4 style colours) -->
    <polygon points="0,-6 -2.5,0 0,-1" fill="#FF6B6B"/>
    <polygon points="0,-6 2.5,0 0,-1" fill="#F59E0B"/>
    <!-- Compass needle - south -->
    <polygon points="0,6 -2.5,0 0,1" fill="#059669"/>
    <polygon points="0,6 2.5,0 0,1" fill="#3B82F6"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="1.5" fill="white"/>
  </g>
</svg>
